name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*", "*.*.*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        run: |
          docker buildx create --name graphite-builder --use
          docker buildx inspect --bootstrap

      - name: Log in to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Compute image tags
        id: tags
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          TAGS="$IMAGE_REF:${SHA}"

          if [ "$REF_TYPE" = "branch" ] && [ "$REF_NAME" = "$DEFAULT_BRANCH" ]; then
            TAGS="$TAGS,$IMAGE_REF:latest"
          fi

          if [ "$REF_TYPE" = "tag" ]; then
            VERSION="${REF_NAME#v}"
            TAGS="$TAGS,$IMAGE_REF:$VERSION"

            MAJOR="$(echo "$VERSION" | cut -d. -f1)"
            MINOR="$(echo "$VERSION" | cut -d. -f2)"
            if [ -n "$MAJOR" ] && [ -n "$MINOR" ]; then
              TAGS="$TAGS,$IMAGE_REF:$MAJOR.$MINOR"
            fi
          fi

          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        env:
          TAGS: ${{ steps.tags.outputs.tags }}
          REVISION: ${{ github.sha }}
          SOURCE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          TAG_ARGS=""
          OLD_IFS="$IFS"
          IFS=','
          for tag in $TAGS; do
            TAG_ARGS="$TAG_ARGS --tag $tag"
          done
          IFS="$OLD_IFS"

          docker buildx build \
            --platform linux/amd64 \
            --push \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            --label org.opencontainers.image.source="$SOURCE_URL" \
            --label org.opencontainers.image.revision="$REVISION" \
            $TAG_ARGS \
            .
